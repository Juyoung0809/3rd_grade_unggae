server:
  port: 8080

spring:
  application:
    name: unggae
  datasource:
    url: jdbc:mysql://localhost:3306/unggae?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: "0809"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: unggae-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-token-expiration: 1800000    # 30분 (ms)
  refresh-token-expiration: 604800000 # 7일 (ms)

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
